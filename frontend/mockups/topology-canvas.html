<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Topology Canvas</title>
  </head>
  <body class="min-h-screen bg-[#05070b] text-slate-100">
    <main class="grid min-h-screen grid-cols-12 gap-3 p-3">
      <section class="col-span-9 rounded-xl border border-[#1d3b6e] bg-[#0b1220] p-3 shadow-[0_0_0_1px_rgba(34,211,238,0.2),0_0_24px_rgba(34,211,238,0.18)]">
        <header class="mb-3 flex items-center justify-between">
          <h1 class="text-lg font-semibold text-cyan-300">Real-Time Topology Canvas</h1>
          <div class="flex gap-2 text-xs">
            <button class="rounded border border-cyan-500 px-2 py-1">Copy Node ID</button>
            <button class="rounded border border-amber-500 px-2 py-1">Drag Asset</button>
          </div>
        </header>
        <div class="grid h-[82vh] place-items-center rounded-lg border border-slate-700 bg-[#111a2b] text-slate-400">
          React Flow Surface (VXLAN | MPLS | QUANTUM_FABRIC)
        </div>
      </section>
      <aside class="col-span-3 space-y-3">
        <div class="rounded-xl border border-slate-700 bg-[#0b1220] p-3">
          <h2 class="mb-2 text-sm font-semibold text-cyan-300">Tenant Context</h2>
          <p class="text-xs text-slate-300">tenant-east/prod-fabric-a</p>
        </div>
        <div class="rounded-xl border border-slate-700 bg-[#0b1220] p-3">
          <h2 class="mb-2 text-sm font-semibold text-cyan-300">Execution Console</h2>
          <ul class="space-y-2 text-xs">
            <li class="rounded bg-slate-900 p-2">pipe-3518 RUNNING</li>
            <li class="rounded bg-slate-900 p-2">machine-job ENQUEUED</li>
          </ul>
        </div>
      </aside>
    </main>
  </body>
</html>
