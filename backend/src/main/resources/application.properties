quarkus.http.port=8080
quarkus.package.type=native
quarkus.native.additional-build-args=--initialize-at-build-time

quarkus.datasource.db-kind=postgresql
quarkus.datasource.reactive.url=postgresql://localhost:5432/reactor
quarkus.datasource.username=reactor
quarkus.datasource.password=reactor

reactor.alert.default-msisdn=+14155550123
reactor.ai.default-language=python
reactor.sandbox.timeout-ms=800
reactor.smpp.max-attempts=5
reactor.smpp.base-delay-ms=300
